<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="1em" height="1em">
  <title>Microservices</title>
  <!-- Decentralized network representing microservices -->
  <!-- Central coordinate service -->
  <circle cx="12" cy="12" r="3" fill="currentColor" />
  <!-- Surrounding services -->
  <circle cx="12" cy="4" r="2" />
  <circle cx="4" cy="18" r="2" />
  <circle cx="20" cy="18" r="2" />
  <!-- Connecting lines -->
  <line x1="12" y1="6" x2="12" y2="9" />
  <line x1="5.5" y1="16.5" x2="10" y2="13.5" />
  <line x1="18.5" y1="16.5" x2="14" y2="13.5" />
  <!-- Loose dashed boundaries representing decoupling -->
  <path d="M12 4a14 14 0 0 0-8 14M20 18a14 14 0 0 0-8-14" stroke-dasharray="3,3" opacity="0.5" />
</svg>
